<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule V2 — Mo's Virtual Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e0e0e0;
    }

    .chat-container {
      width: 100%;
      max-width: 600px;
      height: 90vh;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-header h1 {
      font-size: 1.4em;
      color: #e8b4f8;
    }

    .chat-header p {
      font-size: 0.85em;
      color: #aaa;
      margin-top: 4px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.95em;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #533483;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .message.typing {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      color: #aaa;
      font-style: italic;
    }

    .input-area {
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 0.95em;
      outline: none;
    }

    .input-area input::placeholder { color: #888; }
    .input-area input:focus { border-color: #e8b4f8; }

    .input-area button {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      background: #533483;
      color: #fff;
      font-size: 0.95em;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #6b44a0; }
    .input-area button:disabled { background: #333; cursor: not-allowed; }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🧪 Molecule V2</h1>
      <p>Mo's Virtual Assistant — ask me anything about Molecule!</p>
    </div>
    <div class="messages" id="messages">
      <div class="message assistant">
        Hey there! 👋 I'm Molecule V2, Mo's virtual assistant. Ask me anything about her — school, career, life in SF, you name it!
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let sessionId = null;
    const input = document.getElementById('userInput');
    const messagesDiv = document.getElementById('messages');
    const sendBtn = document.getElementById('sendBtn');

    let chatHistory = [];

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      sendBtn.disabled = true;

      const typingEl = addMessage('Thinking...', 'typing');

      try {
        const res = await fetch('https://6okrr4nt3c.execute-api.us-west-2.amazonaws.com/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, messages: chatHistory }),
        });
        const data = await res.json();
        typingEl.remove();

        if (data.error) {
          addMessage('Oops, something went wrong. Try again?', 'assistant');
        } else {
          chatHistory.push({ role: 'user', content: text });
          chatHistory.push({ role: 'assistant', content: data.response });
          addMessage(data.response, 'assistant');
        }
      } catch (err) {
        typingEl.remove();
        addMessage('Connection error — try again in a sec.', 'assistant');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
