<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>momoparadise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh; display: flex; background: #f9f9f9; color: #2d2d2d;
    }

    /* Sidebar */
    .sidebar {
      width: 260px; background: #DD4470; color: white;
      display: flex; flex-direction: column; padding: 24px 20px;
      flex-shrink: 0;
    }
    .sidebar h1 { font-size: 1.3em; font-weight: 800; margin-bottom: 4px; }
    .sidebar p { font-size: 0.75em; opacity: 0.7; line-height: 1.4; }
    .sidebar .new-chat {
      margin-top: 24px; padding: 10px 14px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.3); background: transparent;
      color: white; font-size: 0.85em; cursor: pointer; text-align: left;
      transition: background 0.2s;
    }
    .sidebar .new-chat:hover { background: rgba(255,255,255,0.15); }
    .sidebar .spacer { flex: 1; }
    .sidebar .footer { font-size: 0.7em; opacity: 0.5; }
    .sidebar .footer a { color: white; }

    /* Main area */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .messages {
      flex: 1; overflow-y: auto; padding: 0;
    }
    .msg-row {
      padding: 24px 0; border-bottom: 1px solid #f0f0f0;
    }
    .msg-row:last-child { border-bottom: none; }
    .msg-row.assistant { background: #f7f7f8; }
    .msg-inner {
      max-width: 680px; margin: 0 auto; padding: 0 24px;
      font-size: 0.95em; line-height: 1.7;
    }
    .msg-row.user .msg-inner { font-weight: 500; }
    .msg-row.typing .msg-inner { color: #999; font-style: italic; }
    .msg-label {
      font-size: 0.75em; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 6px; color: #999;
    }
    .msg-row.user .msg-label { color: #DD4470; }
    .msg-row.assistant .msg-label { color: #1DAB87; }

    /* Input */
    .input-area {
      border-top: 1px solid #e8e8e8; padding: 16px 24px; background: white;
    }
    .input-wrap {
      max-width: 680px; margin: 0 auto; display: flex; gap: 10px;
    }
    .input-wrap input {
      flex: 1; padding: 14px 18px; border-radius: 12px;
      border: 1px solid #ddd; font-size: 0.93em; outline: none;
      background: #f9f9f9; transition: border-color 0.2s;
    }
    .input-wrap input:focus { border-color: #DD4470; background: white; }
    .input-wrap input::placeholder { color: #bbb; }
    .input-wrap button {
      padding: 14px 24px; border-radius: 12px; border: none;
      background: #DD4470; color: white; font-size: 0.93em;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .input-wrap button:hover { background: #c43d65; }
    .input-wrap button:disabled { background: #ddd; cursor: not-allowed; }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    /* Mobile */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .msg-inner, .input-wrap { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>🌴 momoparadise</h1>
    <p>Molecule's upgraded somflash (iykyk)</p>
    <button class="new-chat" onclick="clearChat()">+ New chat</button>
    <div class="spacer"></div>
    <div class="footer">
      Powered by Amazon Nova
      <br><a href="https://www.linkedin.com/in/monapasorn/" target="_blank">Mo's LinkedIn</a>
    </div>
  </div>
  <div class="main">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="userInput" placeholder="Message momoparadise..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

<script>
let chatHistory = [];
const input = document.getElementById('userInput');
const messagesDiv = document.getElementById('messages');
const sendBtn = document.getElementById('sendBtn');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
});

function clearChat() {
  chatHistory = [];
  messagesDiv.innerHTML = '';
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  input.value = '';
  sendBtn.disabled = true;
  const typ = addMessage('Thinking...', 'typing');
  try {
    const res = await fetch('https://6okrr4nt3c.execute-api.us-west-2.amazonaws.com/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, messages: chatHistory }),
    });
    const data = await res.json();
    typ.remove();
    if (data.error) {
      addMessage('Oops, something went wrong. Try again?', 'assistant');
    } else {
      chatHistory.push({ role: 'user', content: text });
      chatHistory.push({ role: 'assistant', content: data.response });
      addMessage(data.response, 'assistant');
    }
  } catch (err) {
    typ.remove();
    addMessage('Connection error — try again in a sec.', 'assistant');
  }
  sendBtn.disabled = false;
  input.focus();
}

function addMessage(text, type) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + type;
  const label = type === 'user' ? 'You' : type === 'typing' ? '' : 'momoparadise';
  row.innerHTML = '<div class="msg-inner">'
    + (label ? '<div class="msg-label">' + label + '</div>' : '')
    + '<div>' + text + '</div></div>';
  messagesDiv.appendChild(row);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return row;
}
</script>
</body>
</html>
