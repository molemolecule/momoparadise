<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>momoparadise — Mo's Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: repeating-linear-gradient(
        90deg,
        #FE72A9 0px, #FE72A9 48px,
        #B8C4E8 48px, #B8C4E8 96px
      );
      background-size: 96px 100%;
    }

    .chat-container {
      width: 100%;
      max-width: 520px;
      height: 88vh;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      border: 4px solid #FE72A9;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(221, 68, 112, 0.25);
    }

    .chat-header {
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #DD4470, #FE72A9);
      position: relative;
    }

    .chat-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        #1DAB87 0px, #1DAB87 20px,
        #F5943B 20px, #F5943B 40px
      );
    }

    .chat-header h1 {
      font-size: 1.6em;
      font-weight: 800;
      color: white;
      letter-spacing: 1px;
    }

    .chat-header p {
      font-size: 0.8em;
      color: rgba(255,255,255,0.85);
      margin-top: 4px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #FFFAF5;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.93em;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #DD4470, #FE72A9);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #E8EDF8;
      color: #3a3a5c;
      border-bottom-left-radius: 4px;
      border-left: 3px solid #B8C4E8;
    }

    .message.typing {
      align-self: flex-start;
      background: #E8EDF8;
      color: #8890a8;
      font-style: italic;
    }

    .input-area {
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      background: white;
      border-top: 3px solid #1DAB87;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 14px;
      border: 2px solid #E8EDF8;
      background: #FAFBFF;
      color: #3a3a5c;
      font-size: 0.93em;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input::placeholder { color: #b0b8d0; }
    .input-area input:focus { border-color: #FE72A9; }

    .input-area button {
      padding: 12px 22px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #1DAB87, #1DAB87);
      color: white;
      font-size: 0.93em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .input-area button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(29, 171, 135, 0.35);
    }
    .input-area button:disabled {
      background: #c8d0d8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb {
      background: #FE72A9;
      border-radius: 3px;
    }
    .messages::-webkit-scrollbar-track { background: transparent; }

    @media (max-width: 560px) {
      .chat-container {
        max-width: 100%;
        height: 100vh;
        border-radius: 0;
        border: none;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🌴 momoparadise</h1>
      <p>Molecule's upgraded version of somflash (iykyk)</p>
    </div>
    <div class="messages" id="messages">
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Say hi to momoparadise..." autocomplete="off">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let chatHistory = [];
    const input = document.getElementById('userInput');
    const messagesDiv = document.getElementById('messages');
    const sendBtn = document.getElementById('sendBtn');

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      sendBtn.disabled = true;

      const typingEl = addMessage('Thinking...', 'typing');

      try {
        const res = await fetch('https://6okrr4nt3c.execute-api.us-west-2.amazonaws.com/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, messages: chatHistory }),
        });
        const data = await res.json();
        typingEl.remove();

        if (data.error) {
          addMessage('Oops, something went wrong. Try again?', 'assistant');
        } else {
          chatHistory.push({ role: 'user', content: text });
          chatHistory.push({ role: 'assistant', content: data.response });
          addMessage(data.response, 'assistant');
        }
      } catch (err) {
        typingEl.remove();
        addMessage('Connection error — try again in a sec.', 'assistant');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
