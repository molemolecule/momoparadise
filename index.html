<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>momoparadise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column;
      background: #f9f9f9; color: #2d2d2d;
      height: 100dvh; height: 100vh;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    }

    .top-nav {
      display: flex; align-items: center; padding: 10px 16px;
      background: white; border-bottom: 1px solid #eee;
      flex-shrink: 0; gap: 6px; z-index: 10;
    }
    .top-nav a {
      padding: 8px 16px; border-radius: 10px; font-size: 0.85em; font-weight: 600;
      text-decoration: none; color: #888; transition: all 0.15s;
      white-space: nowrap;
    }
    .top-nav a:hover { background: #f0f0f0; color: #2d2d2d; }
    .top-nav a.active { background: #DD4470; color: white; }
    .top-nav a.moro { }
    .top-nav a.moro.active { background: #7c4dff; color: white; }
    .top-nav .spacer { flex: 1; }

    /* Welcome screen */
    .welcome {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 40px 24px; text-align: center;
    }
    .welcome .hero-photo {
      width: 140px; height: 140px; border-radius: 50%;
      object-fit: cover; object-position: top;
      margin-bottom: 16px;
      border: 3px solid #DD4470;
    }
    .welcome h1 {
      font-size: 2em; font-weight: 800; color: #DD4470; margin-bottom: 8px;
    }
    .welcome p {
      font-size: 0.9em; color: #999; margin-bottom: 32px;
    }
    .welcome .input-wrap {
      width: 100%; max-width: 600px; display: flex; gap: 10px;
    }

    /* Chat screen */
    .chat-screen {
      display: none; flex-direction: column; flex: 1; overflow: hidden;
    }
    .chat-screen.active { display: flex; }

    .messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0; }

    .msg-row {
      padding: 20px 0; border-bottom: 1px solid #f0f0f0;
    }
    .msg-row:last-child { border-bottom: none; }
    .msg-row.assistant { background: #f7f7f8; }

    .msg-inner {
      max-width: 680px; margin: 0 auto; padding: 0 24px;
      display: flex; gap: 14px; align-items: flex-start;
    }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg-avatar.mo {
      object-fit: cover; object-position: top;
      border: 2px solid #DD4470;
    }
    .msg-avatar.user-icon {
      background: #ddd; display: flex; align-items: center;
      justify-content: center;
    }
    .msg-avatar.user-icon svg {
      width: 18px; height: 18px; fill: #888;
    }

    .msg-body { flex: 1; min-width: 0; }
    .msg-label {
      font-size: 0.75em; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px; color: #999;
    }
    .msg-row.user .msg-label { color: #DD4470; }
    .msg-row.assistant .msg-label { color: #1DAB87; }
    .msg-text {
      font-size: 0.95em; line-height: 1.7;
    }
    .msg-row.user .msg-text { font-weight: 500; }
    .msg-row.typing .msg-text { color: #999; font-style: italic; }

    /* Input */
    .input-area {
      border-top: 1px solid #e8e8e8; padding: 12px 24px; background: white;
      flex-shrink: 0; z-index: 10;
    }
    .input-area .input-wrap {
      max-width: 680px; margin: 0 auto; display: flex; gap: 10px;
    }
    .input-wrap input {
      flex: 1; padding: 14px 18px; border-radius: 12px;
      border: 1px solid #ddd; font-size: 0.93em; outline: none;
      background: white; transition: border-color 0.2s;
    }
    .input-wrap input:focus { border-color: #DD4470; }
    .input-wrap input::placeholder { color: #bbb; }
    .input-wrap button {
      padding: 14px 24px; border-radius: 12px; border: none;
      background: #DD4470; color: white; font-size: 0.93em;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .input-wrap button:hover { background: #c43d65; }
    .input-wrap button:disabled { background: #ddd; cursor: not-allowed; }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    @media (max-width: 600px) {
      .welcome h1 { font-size: 1.6em; }
      .welcome .hero-photo { width: 110px; height: 110px; }
      .msg-inner, .input-area .input-wrap { padding: 0 12px; }
      .input-area { padding: 10px 12px; }
      .top-nav { padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <a href="index.html" class="active">🌴 momoparadise</a>
    <a href="moroscope.html" class="moro">🔮 Moroscope</a>
    <div class="spacer"></div>
  </div>

  <div class="welcome" id="welcome">
    <img src="mo.png" alt="Mo" class="hero-photo">
    <h1>🌴 momoparadise 🦖</h1>
    <p>Molecule's personal assistant · somflash.2026 (iykyk). Ask me anything about her!</p>
    <div class="input-wrap">
      <input type="text" id="welcomeInput" placeholder="Message momoparadise..." autocomplete="off">
      <button onclick="firstMessage()">Send</button>
    </div>
  </div>

  <div class="chat-screen" id="chatScreen">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="chatInput" placeholder="Message momoparadise..." autocomplete="off">
        <button id="chatBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

<script>
// Safari mobile keyboard fix
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
    setTimeout(() => {
      const msgs = document.getElementById('messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 100);
  });
  window.visualViewport.addEventListener('scroll', () => {
    window.scrollTo(0, 0);
  });
}

const USER_SVG = '<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>';

let chatHistory = [];
let sessionId = null;
const welcomeEl = document.getElementById('welcome');
const chatScreen = document.getElementById('chatScreen');
const welcomeInput = document.getElementById('welcomeInput');
const chatInput = document.getElementById('chatInput');
const messagesDiv = document.getElementById('messages');
const chatBtn = document.getElementById('chatBtn');

welcomeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') firstMessage();
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !chatBtn.disabled) sendMessage();
});

function firstMessage() {
  const text = welcomeInput.value.trim();
  if (!text) return;
  welcomeEl.style.display = 'none';
  chatScreen.classList.add('active');
  addMessage(text, 'user');
  doSend(text);
  chatInput.focus();
}

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  chatInput.value = '';
  doSend(text);
}

async function doSend(text) {
  chatBtn.disabled = true;
  const typ = addMessage('Thinking...', 'typing');
  try {
    const res = await fetch('https://6okrr4nt3c.execute-api.us-west-2.amazonaws.com/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, messages: chatHistory, session_id: sessionId, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone }),
    });
    const data = await res.json();
    typ.remove();
    if (data.error) {
      addMessage('Oops, something went wrong. Try again?', 'assistant');
    } else {
      chatHistory.push({ role: 'user', content: text });
      chatHistory.push({ role: 'assistant', content: data.response });
      if (data.session_id) sessionId = data.session_id;
      addMessage(data.response, 'assistant');
    }
  } catch (err) {
    typ.remove();
    addMessage('Connection error — try again in a sec.', 'assistant');
  }
  chatBtn.disabled = false;
  chatInput.focus();
}

function formatText(text) {
  let html = text;
  // Newlines to <br>
  html = html.replace(/\n/g, '<br>');
  // Bold **text**
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic *text*
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Headers ### text
  html = html.replace(/#{3,}\s*(.+?)(<br>|$)/g, '<strong style="font-size:1.05em;">$1</strong>$2');
  // Markdown links [text](url)
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
    '<a href="$2" target="_blank" style="color:#DD4470;text-decoration:underline;">$1</a>');
  // Raw URLs
  html = html.replace(/(^|[^"'>])(https?:\/\/[^\s<]+)/g,
    '$1<a href="$2" target="_blank" style="color:#DD4470;text-decoration:underline;">$2</a>');
  // Bullet points - text
  html = html.replace(/(<br>)\s*[-•]\s+/g, '$1&nbsp;&nbsp;• ');
  return html;
}

function addMessage(text, type) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + type;

  let avatar;
  if (type === 'user') {
    avatar = '<div class="msg-avatar user-icon">' + USER_SVG + '</div>';
  } else {
    avatar = '<img src="mo.png" alt="Mo" class="msg-avatar mo">';
  }

  const label = type === 'user' ? 'You' : type === 'typing' ? '' : 'momoparadise';

  row.innerHTML = '<div class="msg-inner">'
    + avatar
    + '<div class="msg-body">'
    + (label ? '<div class="msg-label">' + label + '</div>' : '')
    + '<div class="msg-text">' + formatText(text) + '</div>'
    + '</div></div>';

  messagesDiv.appendChild(row);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return row;
}
</script>
</body>
</html>
