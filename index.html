<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>momoparadise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      background: #f9f9f9; color: #2d2d2d;
    }

    /* Welcome screen (centered) */
    .welcome {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 40px 24px; text-align: center;
      transition: opacity 0.3s;
    }
    .welcome h1 {
      font-size: 2em; font-weight: 800; color: #DD4470;
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 0.9em; color: #999; margin-bottom: 32px;
    }
    .welcome .input-wrap {
      width: 100%; max-width: 600px; display: flex; gap: 10px;
    }

    /* Chat screen (hidden initially) */
    .chat-screen {
      display: none; flex-direction: column; flex: 1;
    }
    .chat-screen.active { display: flex; }

    .messages {
      flex: 1; overflow-y: auto; padding: 0;
    }
    .msg-row {
      padding: 24px 0; border-bottom: 1px solid #f0f0f0;
    }
    .msg-row:last-child { border-bottom: none; }
    .msg-row.assistant { background: #f7f7f8; }
    .msg-inner {
      max-width: 680px; margin: 0 auto; padding: 0 24px;
      font-size: 0.95em; line-height: 1.7;
    }
    .msg-row.user .msg-inner { font-weight: 500; }
    .msg-row.typing .msg-inner { color: #999; font-style: italic; }
    .msg-label {
      font-size: 0.75em; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 6px; color: #999;
    }
    .msg-row.user .msg-label { color: #DD4470; }
    .msg-row.assistant .msg-label { color: #1DAB87; }

    /* Input bar */
    .input-area {
      border-top: 1px solid #e8e8e8; padding: 16px 24px; background: white;
    }
    .input-area .input-wrap {
      max-width: 680px; margin: 0 auto; display: flex; gap: 10px;
    }

    /* Shared input styles */
    .input-wrap input {
      flex: 1; padding: 14px 18px; border-radius: 12px;
      border: 1px solid #ddd; font-size: 0.93em; outline: none;
      background: white; transition: border-color 0.2s;
    }
    .input-wrap input:focus { border-color: #DD4470; }
    .input-wrap input::placeholder { color: #bbb; }
    .input-wrap button {
      padding: 14px 24px; border-radius: 12px; border: none;
      background: #DD4470; color: white; font-size: 0.93em;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .input-wrap button:hover { background: #c43d65; }
    .input-wrap button:disabled { background: #ddd; cursor: not-allowed; }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    @media (max-width: 600px) {
      .welcome h1 { font-size: 1.6em; }
      .msg-inner, .input-area .input-wrap { padding: 0 16px; }
      .welcome .input-wrap { padding: 0 8px; }
    }
  </style>
</head>
<body>

  <!-- Welcome screen -->
  <div class="welcome" id="welcome">
    <h1>🌴 momoparadise</h1>
    <p>molecule's personal assistant · somflash.2026 (iykyk)</p>
    <div class="input-wrap">
      <input type="text" id="welcomeInput" placeholder="Message momoparadise..." autocomplete="off">
      <button id="welcomeBtn" onclick="firstMessage()">Send</button>
    </div>
  </div>

  <!-- Chat screen -->
  <div class="chat-screen" id="chatScreen">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="chatInput" placeholder="Message momoparadise..." autocomplete="off">
        <button id="chatBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

<script>
let chatHistory = [];
const welcomeEl = document.getElementById('welcome');
const chatScreen = document.getElementById('chatScreen');
const welcomeInput = document.getElementById('welcomeInput');
const chatInput = document.getElementById('chatInput');
const messagesDiv = document.getElementById('messages');
const chatBtn = document.getElementById('chatBtn');

welcomeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') firstMessage();
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !chatBtn.disabled) sendMessage();
});

function firstMessage() {
  const text = welcomeInput.value.trim();
  if (!text) return;
  welcomeEl.style.display = 'none';
  chatScreen.classList.add('active');
  chatInput.value = '';
  addMessage(text, 'user');
  doSend(text);
  chatInput.focus();
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  chatInput.value = '';
  doSend(text);
}

async function doSend(text) {
  chatBtn.disabled = true;
  const typ = addMessage('Thinking...', 'typing');
  try {
    const res = await fetch('https://6okrr4nt3c.execute-api.us-west-2.amazonaws.com/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, messages: chatHistory }),
    });
    const data = await res.json();
    typ.remove();
    if (data.error) {
      addMessage('Oops, something went wrong. Try again?', 'assistant');
    } else {
      chatHistory.push({ role: 'user', content: text });
      chatHistory.push({ role: 'assistant', content: data.response });
      addMessage(data.response, 'assistant');
    }
  } catch (err) {
    typ.remove();
    addMessage('Connection error — try again in a sec.', 'assistant');
  }
  chatBtn.disabled = false;
  chatInput.focus();
}

function addMessage(text, type) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + type;
  const label = type === 'user' ? 'You' : type === 'typing' ? '' : 'momoparadise';
  row.innerHTML = '<div class="msg-inner">'
    + (label ? '<div class="msg-label">' + label + '</div>' : '')
    + '<div>' + text + '</div></div>';
  messagesDiv.appendChild(row);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return row;
}
</script>
</body>
</html>
